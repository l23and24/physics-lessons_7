<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підготовка до контрольної роботи: Тиск</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            /* Оптимізація для смарт-дошок: запобігання випадковому виділенню тексту при дотику */
            user-select: none;
        }

        .card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            background-color: #ffffff;
            border: 2px solid #f1f5f9; /* Товстіша рамка для кращої видимості на дошці */
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        /* Стиль для великого та чіткого відображення фото */
        .photo-container {
            width: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .lesson-image {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        /* Збільшені кнопки для зручного натискання пальцем на дошці */
        .touch-button {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        /* Прибираємо курсив скрізь */
        * {
            font-style: normal !important;
        }
    </style>
</head>
<body class="text-slate-900 antialiased flex flex-col min-h-screen">

    <!-- Header Section -->
    <header class="bg-blue-600 text-white py-12 px-4 mb-8">
        <div class="max-w-5xl mx-auto text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4 leading-tight">
                Готуємося до контрольної роботи з теми:<br>
                <span class="text-blue-100">“Тиск твердих тіл, рідин та газів”</span>
            </h1>
            <div class="h-1.5 w-24 bg-blue-400 mx-auto rounded-full"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-16 flex-grow w-full">
        
        <!-- Main Content Section -->
        <section class="mb-16">
            <h2 class="text-2xl font-bold mb-8 text-slate-700 uppercase tracking-wider flex items-center">
                <span class="bg-blue-600 w-3 h-8 mr-4 rounded-full"></span>
                Матеріали для опрацювання
            </h2>
            
            <!-- Відображення фото з репозиторію -->
            <div class="photo-container shadow-sm p-1 border border-slate-100 rounded-xl">
                <img src="lesson-photo.jpg" alt="Матеріали уроку" class="lesson-image">
            </div>

            <div class="mt-10 text-center">
                <a href="https://drive.google.com/file/d/15YbAIkU-P_kWoC8UFCKcCTDANuevjluo/view?usp=sharing" target="_blank" class="touch-button inline-flex items-center font-bold text-blue-700 border-2 border-blue-200 px-8 py-4 rounded-xl transition-all hover:bg-blue-50 bg-white shadow-sm">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    Відкрити оригінал у високій якості
                </a>
            </div>
        </section>

        <!-- Variants Section -->
        <section>
            <h2 class="text-2xl font-bold mb-8 text-slate-700 uppercase tracking-wider flex items-center">
                <span class="bg-blue-600 w-3 h-8 mr-4 rounded-full"></span>
                Завдання для самоперевірки
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                
                <!-- Variant 1 -->
                <a href="https://docs.google.com/document/d/1AeHh8Hd04RrNjnUIcFRUuAOzkngoft9xcsryPd7Zh2c/edit?usp=sharing" target="_blank" class="card p-8 rounded-2xl block text-center border-blue-100 bg-blue-50/30">
                    <h3 class="font-extrabold text-blue-600 text-xl mb-3">Варіант №1</h3>
                    <p class="text-sm text-slate-500 font-medium">Перейти до Google Docs</p>
                </a>

                <!-- Other Variants -->
                <div class="card p-8 rounded-2xl text-center opacity-50 bg-slate-50 border-slate-200">
                    <h3 class="font-bold text-slate-400 text-xl mb-3">Варіант №2</h3>
                    <p class="text-sm text-slate-400 font-medium uppercase tracking-tighter">Незабаром</p>
                </div>

                <div class="card p-8 rounded-2xl text-center opacity-50 bg-slate-50 border-slate-200">
                    <h3 class="font-bold text-slate-400 text-xl mb-3">Варіант №3</h3>
                    <p class="text-sm text-slate-400 font-medium uppercase tracking-tighter">Незабаром</p>
                </div>

                <div class="card p-8 rounded-2xl text-center opacity-50 bg-slate-50 border-slate-200">
                    <h3 class="font-bold text-slate-400 text-xl mb-3">Варіант №4</h3>
                    <p class="text-sm text-slate-400 font-medium uppercase tracking-tighter">Незабаром</p>
                </div>

            </div>
        </section>
    </main>

    <!-- Footer з новим текстом -->
    <footer class="border-t-2 border-slate-100 py-12 px-4 mt-12 bg-slate-50">
        <div class="max-w-5xl mx-auto text-center text-slate-600 font-bold text-lg">
            <p>ОНЛАЙН КАБІНЕТ ФІЗИКИ 229</p>
        </div>
    </footer>

</body>
</html>
