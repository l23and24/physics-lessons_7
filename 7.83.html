<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Урок: Готуємося до контрольної роботи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-demo {
            @apply flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white focus:outline-none focus:ring-2 focus:ring-offset-2 transition-all duration-200;
        }
        .active-btn { @apply bg-blue-600 hover:bg-blue-700; }
        .inactive-btn { @apply bg-gray-400 cursor-not-allowed opacity-75; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Заголовок уроку -->
    <header class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 uppercase tracking-wide border-b-4 border-blue-500 pb-2">
            Готуємося до контрольної роботи
        </h1>
        <p class="text-xl text-gray-600 mt-2 text-center uppercase tracking-tighter">Тема: Тиск твердих тіл, рідин і газів</p>
    </header>

    <!-- Зображення (зменшене в 2 рази) -->
    <div class="mb-10 shadow-lg rounded-xl overflow-hidden bg-white">
        <img 
            src="https://lh3.googleusercontent.com/d/15YbAIkU-P_kWoC8UFCKcCTDANuevjluo" 
            alt="Схема до уроку" 
            style="width: 50%; display: block; margin: 0 auto;"
            class="h-auto"
            onerror="this.onerror=null; this.src='https://placehold.co/600x400?text=Картинка+з+Google+Drive';"
        >
    </div>

    <!-- Блок кнопок -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-2xl">
        
        <!-- Демо-варіант 1 (Активний) -->
        <a href="https://drive.google.com/file/d/1RZj2ThSJGBFWkSpMAaXEAu-FqKP0n2aV/view?usp=drive_link" 
           target="_blank" 
           class="btn-demo active-btn text-center">
            Демо-варіант 1
        </a>

        <!-- Демо-варіант 2 (Активний) -->
        <a href="https://drive.google.com/file/d/1luygH9vb9RolpP8enmdx1UaMqK1m5MVJ/view?usp=sharing" 
           target="_blank" 
           class="btn-demo active-btn text-center">
            Демо-варіант 2
        </a>

        <!-- Демо-варіант 3 (Неактивний) -->
        <button class="btn-demo inactive-btn" disabled title="Буде доступно пізніше">
            Демо-варіант 3
        </button>

        <!-- Демо-варіант 4 (Неактивний) -->
        <button class="btn-demo inactive-btn" disabled title="Буде доступно пізніше">
            Демо-варіант 4
        </button>

    </div>

    <!-- Оновлений футер -->
    <footer class="mt-16 text-gray-500 text-lg font-semibold">
        Онлайн-кабінет фізики 229
    </footer>

</body>
</html>
